repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]
  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        language: unsupported
        types_or: [python, pyi]
        entry: uv run ty check
      - id: topology-markers
        name: check topology markers
        language: unsupported
        entry: uv run python scripts/check_topology_markers.py
        files: ^tests/(dev_e2e|QE)/.*test_.*\.py$
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]
        types_or: [python, pyi]
  
